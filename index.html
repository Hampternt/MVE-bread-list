<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bread Run</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="logo-icon">🍞</div>
    <div class="header-text">
      <h1>Bread Run</h1>
      <p>Route Checklist</p>
    </div>
    <div class="header-actions">
      <a class="info-btn" href="project-map.html">How the magic is done</a>
      <button class="refresh-btn">↻ Refresh</button>
    </div>
  </header>

  <!-- ROUTE SELECTOR -->
  <div class="route-selector">
    <label for="routeSelect">Route</label>
    <select id="routeSelect">
      <option value="">— Select your route —</option>
    </select>
  </div>

  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat"><strong id="statTotal">0</strong> orders</div>
    <div class="stat-divider">|</div>
    <div class="stat completed"><strong id="statDone">0</strong> done</div>
    <div class="stat-divider">|</div>
    <div class="stat"><strong id="statQty">0</strong> units total</div>
  </div>

  <!-- SORTING STAGE / SUMMARY BOX -->
  <div class="summary-box" id="summaryBox" style="display:none">
    <div class="summary-toggle">
      <div class="summary-toggle-left">
        <span class="summary-title">📦 Sorting Stage</span>
        <span class="summary-subtitle" id="summarySubtitle"></span>
      </div>
      <button class="summary-sort-btn" id="summarySortBtn">QTY ↓</button>
      <span class="summary-chevron" id="summaryChevron">▼</span>
    </div>
    <div class="summary-items" id="summaryItems"></div>
  </div>

  <!-- MAIN CONTENT (customer groups + order cards) -->
  <div class="content" id="content">
    <div class="placeholder">
      <div class="big">🚚</div>
      <p>Select your route to begin</p>
    </div>
  </div>

  <!-- SYNC OVERLAY — blocks all interaction while fetching after customer completion -->
  <div class="sync-overlay" id="syncOverlay">
    <div class="sync-label">Syncing…</div>
  </div>

  <!-- RESET CONFIRMATION DIALOG -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-sheet">
      <div class="confirm-title">Reset checklist?</div>
      <div class="confirm-body">All ticked items will be cleared.<br>This cannot be undone.</div>
      <div class="confirm-actions">
        <button class="confirm-cancel">Cancel</button>
        <button class="confirm-ok">Reset</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
